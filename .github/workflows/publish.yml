name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Install and verify import
        run: |
          pip install dist/*.whl
          python -c "import saladbar; print('saladbar imported successfully')"

      - name: Run tests
        run: DJANGO_SETTINGS_MODULE=tests.settings python -m django test tests --verbosity=2

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(python -c "from importlib.metadata import version; print(version('django-saladbar'))" 2>/dev/null || python -c "import re; print(re.search(r'django.saladbar-(.*?)\.tar\.gz', '$(ls dist/*.tar.gz)').group(1))")
          echo "Tag version: $TAG"
          echo "Package version: $VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Version mismatch: tag=$TAG, package=$VERSION"
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
